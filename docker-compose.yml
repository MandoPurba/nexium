name: nexium

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: nexium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexium}
      POSTGRES_DB: ${POSTGRES_DB:-nexium}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexium} -d ${POSTGRES_DB:-nexium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: nexium-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-nexium}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-nexium}
      POSTGRES_DB: ${TIMESCALE_DB:-nexium_market}
    ports:
      - "${TIMESCALE_PORT:-5433}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-nexium} -d ${TIMESCALE_DB:-nexium_market}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2-alpine
    container_name: nexium-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir", "/data", "--http_port", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexium-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:14269/"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nexium-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations (run-once init) ──────────────────────────────────

  migrate:
    build:
      context: ./migrations
      dockerfile: Dockerfile
    container_name: nexium-migrate
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sqlx migrate run --source /migrations/postgres --database-url postgres://nexium:nexium@postgres:5432/nexium &&
        sqlx migrate run --source /migrations/timescale --database-url postgres://nexium:nexium@timescaledb:5432/nexium_market

  # ── Backend services ────────────────────────────────────────────

  auth:
    build: .
    container_name: nexium-auth
    restart: unless-stopped
    command: ["auth-service"]
    environment:
      NEXIUM_ENV: local
      DATABASE_URL: postgres://nexium:nexium@postgres:5432/nexium
      REDIS_URL: redis://redis:6379
      NEXIUM__NATS__URL: nats://nats:4222
      NEXIUM__TELEMETRY__OTLP_ENDPOINT: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      NEXIUM__SERVER__PORT: "8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  wallet:
    build: .
    container_name: nexium-wallet
    restart: unless-stopped
    command: ["wallet-service"]
    environment:
      NEXIUM_ENV: local
      DATABASE_URL: postgres://nexium:nexium@postgres:5432/nexium
      REDIS_URL: redis://redis:6379
      NEXIUM__NATS__URL: nats://nats:4222
      NEXIUM__TELEMETRY__OTLP_ENDPOINT: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      NEXIUM__SERVER__PORT: "8081"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  order:
    build: .
    container_name: nexium-order
    restart: unless-stopped
    command: ["order-service"]
    environment:
      NEXIUM_ENV: local
      DATABASE_URL: postgres://nexium:nexium@postgres:5432/nexium
      TIMESCALE_URL: postgres://nexium:nexium@timescaledb:5432/nexium_market
      REDIS_URL: redis://redis:6379
      NEXIUM__NATS__URL: nats://nats:4222
      NEXIUM__TELEMETRY__OTLP_ENDPOINT: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      NEXIUM__SERVER__PORT: "8082"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  market-data:
    build: .
    container_name: nexium-market-data
    restart: unless-stopped
    command: ["market-data-service"]
    environment:
      NEXIUM_ENV: local
      DATABASE_URL: postgres://nexium:nexium@postgres:5432/nexium
      TIMESCALE_URL: postgres://nexium:nexium@timescaledb:5432/nexium_market
      REDIS_URL: redis://redis:6379
      NEXIUM__NATS__URL: nats://nats:4222
      NEXIUM__TELEMETRY__OTLP_ENDPOINT: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      NEXIUM__SERVER__PORT: "8083"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # Rust WebSocket gateway — internal only (not exposed to host)
  gateway:
    build: .
    container_name: nexium-gateway
    restart: unless-stopped
    command: ["gateway"]
    environment:
      NEXIUM_ENV: local
      DATABASE_URL: postgres://nexium:nexium@postgres:5432/nexium
      REDIS_URL: redis://redis:6379
      NEXIUM__NATS__URL: nats://nats:4222
      NEXIUM__TELEMETRY__OTLP_ENDPOINT: http://jaeger:4317
      JWT_SECRET: ${JWT_SECRET:-change-me-please}
      NEXIUM__SERVER__PORT: "8085"
    depends_on:
      migrate:
        condition: service_completed_successfully
      nats:
        condition: service_healthy

  # ── Nginx API Gateway ───────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: nexium-nginx
    restart: unless-stopped
    ports:
      - "8084:8084"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - wallet
      - order
      - market-data
      - gateway

  # ── Frontend ────────────────────────────────────────────────────

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8084
        NEXT_PUBLIC_WS_URL: ws://localhost:8084
    container_name: nexium-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  postgres_data:
  timescaledb_data:
  nats_data:
  redis_data:
