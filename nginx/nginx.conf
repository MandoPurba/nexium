worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream services ──────────────────────────────────────────
    upstream auth_service {
        server auth:8080;
    }

    upstream wallet_service {
        server wallet:8081;
    }

    upstream order_service {
        server order:8082;
    }

    upstream market_data_service {
        server market-data:8083;
    }

    upstream gateway_ws {
        server gateway:8085;
    }

    # ── Logging ────────────────────────────────────────────────────
    log_format main '$remote_addr - $request_time "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Common proxy settings ──────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # ── Main server — port 8084 ────────────────────────────────────
    server {
        listen 8084;
        server_name _;

        # CORS — allow requests from the Next.js frontend
        add_header 'Access-Control-Allow-Origin'  '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        # Pre-flight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── WebSocket (gateway Rust service) ──────────────────────
        location /ws {
            proxy_pass         http://gateway_ws;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # ── Auth service ──────────────────────────────────────────
        location /auth/ {
            proxy_pass http://auth_service;
        }

        # ── Wallet service ────────────────────────────────────────
        location /wallets {
            proxy_pass http://wallet_service;
        }

        # ── Order service — trading pairs ─────────────────────────
        location /pairs {
            proxy_pass http://order_service;
        }

        # ── Order service — orders ────────────────────────────────
        location /orders {
            proxy_pass http://order_service;
        }

        # ── Market data service ───────────────────────────────────
        location /market/ {
            proxy_pass http://market_data_service;
        }

        # ── Health check ──────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ── Fallback ──────────────────────────────────────────────
        location / {
            return 404 '{"code":"NOT_FOUND","message":"no route matched","details":null}';
            add_header Content-Type application/json;
        }
    }
}
